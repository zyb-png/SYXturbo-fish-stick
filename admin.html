<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>账号额度管理 · 宋钰汐视频生成</title>
  <link rel="stylesheet" href="./admin.css?v=20260614-1">
</head>
<body>
  <header class="admin-header">
    <div>
      <p class="eyebrow">ADMIN CONSOLE</p>
      <h1>账号与额度管理</h1>
      <p>管理登录账号、视频秒数额度与使用状态。</p>
    </div>
    <nav>
      <a href="/">返回工作台</a>
      <a href="/logout">退出登录</a>
    </nav>
  </header>

  <main>
    <section class="summary-grid" aria-label="账号统计">
      <article><span>账号总数</span><strong id="totalUsers">0</strong></article>
      <article><span>管理员</span><strong id="adminUsers">0 / 4</strong></article>
      <article><span>已分配额度</span><strong id="totalQuota">0</strong></article>
      <article><span>已使用额度</span><strong id="totalUsed">0</strong></article>
    </section>

    <section class="panel create-panel">
      <div class="section-heading">
        <div>
          <h2>添加新账号</h2>
          <p>每生成 1 秒视频扣除 1 点额度，例如 5 秒视频扣除 5 点。</p>
        </div>
      </div>
      <form id="createUserForm" class="create-form">
        <label>账号名<input id="newUsername" required minlength="3" maxlength="32" autocomplete="off"></label>
        <label>初始密码<input id="newPassword" type="password" required minlength="8" maxlength="128" autocomplete="new-password"></label>
        <label>角色
          <select id="newRole">
            <option value="user">普通账号</option>
            <option value="admin">管理员</option>
          </select>
        </label>
        <label>秒数额度<input id="newQuota" type="number" min="0" max="1000000" step="1" value="100" required></label>
        <button class="primary" type="submit">创建账号</button>
      </form>
    </section>

    <section class="panel">
      <div class="section-heading">
        <div>
          <h2>账号使用情况</h2>
          <p>剩余额度少于视频时长时，该账号的生成请求会在服务器端被阻止。</p>
        </div>
        <button id="refreshBtn" type="button">刷新</button>
      </div>
      <div id="message" class="message" hidden></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>账号</th>
              <th>角色</th>
              <th>总额度（秒）</th>
              <th>已使用（秒）</th>
              <th>剩余（秒）</th>
              <th>状态</th>
              <th>最后登录</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./admin.js?v=20260614-seconds-quota-1"></script>
</body>
</html>
