services:
  manfei-seedance:
    build: .
    container_name: manfei-seedance
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4177
      APP_STATE_FILE: /var/data/app-state.json
      DB_FILE: /var/data/manfei.sqlite
    ports:
      - "80:4177"
    volumes:
      - ./data:/var/data
