services:
  manfei-seedance:
    build: .
    container_name: manfei-seedance
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4178
      APP_STATE_FILE: /var/data/app-state.json
      ACCOUNTS_FILE: /var/data/accounts.json
    ports:
      - "80:4178"
    volumes:
      - ./data:/var/data
