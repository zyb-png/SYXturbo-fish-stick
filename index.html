<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>漫飞 Seedance 视频生成</title>
  <script>
    if (location.protocol === 'file:') {
      location.replace('http://localhost:4177/');
    }
    try {
      const savedTheme = localStorage.getItem('manfei_interface_theme');
      if (['gold', 'orange', 'violet', 'cyan', 'pink', 'blue', 'silver'].includes(savedTheme)) {
        document.documentElement.dataset.theme = savedTheme;
      }
    } catch {}
  </script>
  <link rel="stylesheet" href="./styles.css?v=20260701-project-budget">
</head>
<body>
  <main class="app">
    <aside class="side-panel left-panel">
      <div class="side-header">
        <div class="library-title">
          <h2>资源库</h2>
          <span id="resourceCount">0</span>
        </div>
        <div class="library-actions">
          <button id="uploadFilesBtn" class="icon-button" type="button" title="上传本地文件" aria-label="上传本地文件">↑</button>
          <button id="createGroupBtn" class="icon-button" type="button" title="新建资源组" aria-label="新建资源组">＋</button>
          <button id="toggleLibraryToolsBtn" class="icon-button" type="button" title="资源工具" aria-label="展开资源工具" aria-expanded="false">⋯</button>
        </div>
      </div>

      <div id="dropZone" class="drop-zone compact-drop-zone">
        <strong>拖入图片 / 视频 / 音频</strong>
        <span id="uploadTargetName">请先选择资源组</span>
        <input id="filePicker" type="file" multiple accept="image/*,video/*,audio/*">
      </div>

      <section id="libraryToolsPanel" class="panel panel-compact library-tools" hidden>
        <div class="stack">
          <select id="uploadAssetType">
            <option value="Image">Image</option>
            <option value="Video">Video</option>
            <option value="Audio">Audio</option>
          </select>
          <input id="uploadAssetUrl" type="text" placeholder="公网素材 URL">
          <button id="uploadAssetBtn" class="compact-icon-command" type="button" title="将公网 URL 创建为 asset" aria-label="创建 asset">↑ <span>创建 asset</span></button>
          <input id="queryAssetId" type="text" placeholder="asset-id">
          <div class="split">
            <button id="queryAssetBtn" class="icon-button" type="button" title="查询 asset" aria-label="查询 asset">⌕</button>
            <button id="pullAssetBtn" class="icon-button" type="button" title="拉取到资源库" aria-label="拉取到资源库">↓</button>
          </div>
        </div>
      </section>

      <section class="panel panel-compact resource-panel">
        <div id="resourceGroups" class="resource-groups empty">暂无资源组</div>
      </section>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">MF</span>
          <div>
            <h1>漫飞视频生成</h1>
            <p>manfei-new</p>
          </div>
        </div>
        <div class="top-actions">
          <span id="accountBadge" class="top-badge">未登录</span>
          <span id="quotaBadge" class="top-badge">额度 --</span>
          <a id="adminEntry" class="top-link" href="/admin" hidden>后台</a>
          <a id="loginEntry" class="top-link" href="/login">登录</a>
          <a id="logoutEntry" class="top-link" href="/logout" hidden>退出</a>
          <button id="themeSettingsBtn" class="icon-button theme-settings-button" type="button" title="界面设置" aria-label="界面设置" aria-expanded="false">⚙</button>
          <button id="soundToggleBtn" class="icon-button sound-toggle" type="button" title="关闭完成提示音" aria-label="关闭完成提示音" aria-pressed="true">♪</button>
          <button id="usageBtn" class="top-tool-button" type="button">用量</button>
        </div>
      </header>

      <section class="panel generator">
        <div class="section-head">
          <div>
            <h2>多模态参考生视频</h2>
            <p class="section-note">写提示词，选择素材和参数，然后提交生成。</p>
          </div>
          <label class="toggle">
            <input id="syncMode" type="checkbox">
            <span>同步等待</span>
          </label>
        </div>

        <div class="field full prompt-block">
          <div class="prompt-head">
            <span>提示词</span>
            <div class="prompt-actions">
              <button id="savePromptBtn" type="button">保存提示词</button>
              <select id="promptPresetSelect">
                <option value="">选择复用提示词</option>
              </select>
              <button id="applyPromptBtn" type="button">套用</button>
              <button id="deletePromptBtn" type="button">删除</button>
            </div>
          </div>
          <div class="prompt-input-wrap">
            <div id="prompt" class="prompt-editor" contenteditable="true" role="textbox" aria-multiline="true" data-placeholder="输入 @ 引用本次参考素材"></div>
            <div id="mentionMenu" class="mention-menu" hidden></div>
          </div>
          <div class="prompt-hint">输入 @ 引用本次参考素材中的图片、视频或音频</div>
        </div>

        <div class="grid">
          <label class="field">
            <span>项目</span>
            <select id="projectId">
              <option value="">加载项目中...</option>
            </select>
          </label>
          <label class="field">
            <span>模型</span>
            <select id="model">
              <option value="sun-manfei-new">sun-manfei-new 高级</option>
              <option value="moon-manfei-new">moon-manfei-new 标准</option>
            </select>
          </label>
          <label class="field">
            <span>分辨率</span>
            <select id="resolution">
              <option value="480p">480p</option>
              <option value="720p" selected>720p</option>
              <option value="1080p">1080p</option>
            </select>
          </label>
          <label class="field">
            <span>比例</span>
            <select id="ratio">
              <option value="16:9" selected>16:9</option>
              <option value="9:16">9:16</option>
              <option value="1:1">1:1</option>
            </select>
          </label>
          <label class="field">
            <span>时长</span>
            <input id="duration" type="number" min="4" max="15" value="5">
          </label>
        </div>

        <details class="advanced">
          <summary>高级选项</summary>
          <div class="grid compact">
            <label class="field">
              <span>同步轮询间隔</span>
              <input id="pollInterval" type="number" min="0.2" max="10" step="0.2" value="2">
            </label>
            <label class="field">
              <span>同步超时秒数</span>
              <input id="timeoutSeconds" type="number" min="30" max="1800" value="600">
            </label>
            <label class="checkline">
              <input id="watermark" type="checkbox">
              <span>添加水印</span>
            </label>
          </div>
        </details>

        <div class="asset-builder">
          <div class="section-head small">
            <h3>本次参考素材</h3>
            <button id="clearAssetsBtn" type="button">清空</button>
          </div>
          <div id="generationDropZone" class="generation-drop-zone" role="button" tabindex="0">
            <span class="drop-icon">↑</span>
            <span>拖入或点击上传本地素材</span>
          </div>
          <div id="assetList" class="asset-list empty">暂无参考素材</div>
        </div>

        <div class="submit-row">
          <button id="submitBtn" class="primary" type="button">提交生成任务</button>
          <button id="fillDemoBtn" type="button">示例</button>
        </div>
        <div id="statusLine" class="status idle">等待提交</div>
      </section>
    </section>

    <aside class="side-panel right-panel">
      <section class="panel panel-compact activity-panel">
        <div class="section-head">
          <h2>运行记录</h2>
          <div class="right-tools">
            <div class="mini-tabs" role="tablist" aria-label="运行记录类型">
              <button id="tasksTabBtn" class="active" type="button" role="tab" aria-selected="true">任务</button>
              <button id="logsTabBtn" type="button" role="tab" aria-selected="false">日志</button>
              <button id="historyTabBtn" type="button" role="tab" aria-selected="false">历史</button>
            </div>
            <button id="clearRecordsBtn" type="button">清空</button>
          </div>
        </div>
        <div id="taskQueryControls" class="stack">
          <input id="taskId" type="text" placeholder="cgt-xxxxxxxx">
          <div class="split">
            <button id="queryBtn" type="button">查询</button>
            <button id="cancelBtn" type="button">取消</button>
          </div>
        </div>
        <div id="taskRecords" class="record-list empty">暂无任务记录</div>
        <div id="logRecords" class="record-list empty" hidden>暂无日志</div>
        <div id="history" class="record-list history empty" hidden>暂无历史</div>
      </section>
    </aside>
  </main>

  <div id="themeSettings" class="theme-settings" hidden>
    <button id="themeSettingsBackdrop" class="theme-settings-backdrop" type="button" aria-label="关闭界面设置"></button>
    <section class="theme-settings-dialog" role="dialog" aria-modal="true" aria-labelledby="themeSettingsTitle">
      <div class="theme-settings-head">
        <div>
          <h2 id="themeSettingsTitle">界面设置</h2>
          <p>选择喜欢的界面配色</p>
        </div>
        <button id="closeThemeSettingsBtn" class="icon-button" type="button" title="关闭" aria-label="关闭界面设置">×</button>
      </div>
      <div class="theme-options" role="radiogroup" aria-label="界面配色">
        <button class="theme-option" type="button" data-theme-value="gold" role="radio" aria-checked="true">
          <span class="theme-preview theme-preview-gold"><i></i><i></i><i></i></span>
          <span><strong>曜石金</strong><small>沉浸黑金</small></span>
          <b>✓</b>
        </button>
        <button class="theme-option" type="button" data-theme-value="orange" role="radio" aria-checked="false">
          <span class="theme-preview theme-preview-orange"><i></i><i></i><i></i></span>
          <span><strong>晨曦橙</strong><small>清爽暖白</small></span>
          <b>✓</b>
        </button>
        <button class="theme-option" type="button" data-theme-value="violet" role="radio" aria-checked="false">
          <span class="theme-preview theme-preview-violet"><i></i><i></i><i></i></span>
          <span><strong>幻境紫</strong><small>柔和紫白</small></span>
          <b>✓</b>
        </button>
        <button class="theme-option" type="button" data-theme-value="cyan" role="radio" aria-checked="false">
          <span class="theme-preview theme-preview-cyan"><i></i><i></i><i></i></span>
          <span><strong>星海青</strong><small>通透青白</small></span>
          <b>✓</b>
        </button>
        <button class="theme-option" type="button" data-theme-value="pink" role="radio" aria-checked="false">
          <span class="theme-preview theme-preview-pink"><i></i><i></i><i></i></span>
          <span><strong>樱雾粉</strong><small>柔亮粉白</small></span>
          <b>✓</b>
        </button>
        <button class="theme-option" type="button" data-theme-value="blue" role="radio" aria-checked="false">
          <span class="theme-preview theme-preview-blue"><i></i><i></i><i></i></span>
          <span><strong>曜石蓝</strong><small>清透蓝白</small></span>
          <b>✓</b>
        </button>
        <button class="theme-option" type="button" data-theme-value="silver" role="radio" aria-checked="false">
          <span class="theme-preview theme-preview-silver"><i></i><i></i><i></i></span>
          <span><strong>月影银</strong><small>极简银灰</small></span>
          <b>✓</b>
        </button>
      </div>
    </section>
  </div>

  <div id="submitMeteorEffect" class="submit-meteor-effect" aria-hidden="true">
    <span class="submit-meteor"></span>
    <span class="submit-progress-text">任务提交中……</span>
  </div>

  <div id="previewModal" class="preview-modal" hidden>
    <button class="preview-backdrop" type="button" data-close-preview aria-label="关闭预览"></button>
    <section class="preview-dialog" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
      <div class="preview-header">
        <div>
          <h2 id="previewTitle">视频预览</h2>
          <p id="previewTaskId" class="preview-task-id"></p>
        </div>
        <button id="closePreviewBtn" class="icon-button preview-close" type="button" title="关闭" aria-label="关闭">×</button>
      </div>
      <video id="video" controls playsinline></video>
      <div class="preview-actions">
        <a id="openVideoLink" class="download" target="_blank" rel="noopener">新窗口打开</a>
        <button id="download" class="download download-primary" type="button">下载到本地</button>
        <button id="copyJsonBtn" type="button">复制 JSON</button>
      </div>
      <details class="preview-debug">
        <summary>任务数据</summary>
        <pre id="jsonOut">{}</pre>
      </details>
    </section>
  </div>

  <div id="taskToast" class="task-toast" hidden>
    <strong>任务已完成</strong>
    <span id="taskToastText"></span>
  </div>

  <div id="webPet" class="web-pet web-pet-eating" role="button" tabindex="0" aria-label="网页宠物小猫咪，拖拽可以移动位置" title="拖拽移动小猫咪">
    <div class="pet-speech" id="petSpeech">吃点小鱼干</div>
    <div class="pet-sparkles" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="pet-scene pet-food" aria-hidden="true">
      <span></span>
    </div>
    <div class="pet-scene pet-ball" aria-hidden="true">
      <span></span>
    </div>
    <div class="pet-body" aria-hidden="true">
      <span class="pet-tail"></span>
      <span class="pet-ear pet-ear-left"></span>
      <span class="pet-ear pet-ear-right"></span>
      <span class="pet-head-fluff"></span>
      <span class="pet-face">
        <i class="pet-eye pet-eye-left"></i>
        <i class="pet-eye pet-eye-right"></i>
        <i class="pet-eye-shine pet-eye-shine-left"></i>
        <i class="pet-eye-shine pet-eye-shine-right"></i>
        <i class="pet-nose"></i>
        <i class="pet-mouth"></i>
        <i class="pet-blush pet-blush-left"></i>
        <i class="pet-blush pet-blush-right"></i>
        <i class="pet-whisker pet-whisker-left-a"></i>
        <i class="pet-whisker pet-whisker-left-b"></i>
        <i class="pet-whisker pet-whisker-right-a"></i>
        <i class="pet-whisker pet-whisker-right-b"></i>
      </span>
      <span class="pet-collar"></span>
      <span class="pet-bell"></span>
      <span class="pet-paw pet-paw-left"></span>
      <span class="pet-paw pet-paw-right"></span>
      <span class="pet-z pet-z-one">Z</span>
      <span class="pet-z pet-z-two">z</span>
    </div>
  </div>

  <div id="actionModal" class="action-modal" hidden>
    <button id="actionModalBackdrop" class="action-modal-backdrop" type="button" aria-label="取消"></button>
    <form id="actionModalForm" class="action-dialog" role="dialog" aria-modal="true" aria-labelledby="actionModalTitle">
      <h2 id="actionModalTitle">请输入</h2>
      <p id="actionModalMessage" hidden></p>
      <input id="actionModalInput" type="text" autocomplete="off">
      <div class="action-dialog-buttons">
        <button id="actionModalCancel" type="button">取消</button>
        <button id="actionModalConfirm" class="primary" type="submit">确定</button>
      </div>
    </form>
  </div>

  <script src="./app.js?v=20260701-project-budget"></script>
</body>
</html>
