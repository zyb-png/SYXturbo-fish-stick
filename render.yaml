services:
  - type: web
    name: manfei-seedance
    runtime: docker
    plan: starter
    region: singapore
    repo: https://github.com/zyb-png/SYXturbo-fish-stick
    branch: main
    autoDeploy: true
    healthCheckPath: /healthz
    disk:
      name: manfei-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 4178
      - key: APP_STATE_FILE
        value: /var/data/app-state.json
      - key: ACCOUNTS_FILE
        value: /var/data/accounts.json
      - key: MANFEI_API_BASE
        sync: false
      - key: MANFEI_API_TOKEN
        sync: false
      - key: TOS_ACCESS_KEY_ID
        sync: false
      - key: TOS_SECRET_ACCESS_KEY
        sync: false
      - key: TOS_REGION
        value: cn-beijing
      - key: TOS_ENDPOINT
        value: tos-cn-beijing.volces.com
      - key: TOS_BUCKET
        sync: false
      - key: TOS_UPLOAD_PREFIX
        value: manfei-assets/20260605
      - key: TOS_SIGNED_URL_EXPIRES
        value: 604800
      - key: APP_USERNAME
        value: manfei
      - key: APP_PASSWORD
        sync: false
